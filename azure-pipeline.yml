trigger: none

parameters:
- name: terraformAction
  displayName: 'Select Terraform Action'
  type: string
  default: plan
  values:
  - plan
  - apply
  - destroy

pool:
  vmImage: ubuntu-latest

steps:

- task: TerraformInstaller@1
  inputs:
    terraformVersion: 'latest'

- task: AzureCLI@2
  displayName: 'Terraform Execution'
  inputs:
    azureSubscription: 'AzureTerraform'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |

      cd terraform

      terraform init

      terraform validate

      if [ '${{ parameters.terraformAction }}' = 'plan' ]; then
        terraform plan
      fi

      if [ '${{ parameters.terraformAction }}' = 'apply' ]; then
        terraform apply -auto-approve
      fi

      if [ '${{ parameters.terraformAction }}' = 'destroy' ]; then
        terraform destroy -auto-approve
      fi