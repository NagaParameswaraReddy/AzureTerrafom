trigger: none

parameters:
- name: terraformAction
  displayName: Terraform Action
  type: string
  default: plan
  values:
    - plan
    - apply
    - destroy
- name: variableGroupName
  displayName: Azure DevOps Variable Group Name
  type: string
  default: terraform-azure-creds
- name: backendResourceGroupName
  displayName: Terraform State Resource Group
  type: string
  default: tfstate-rg
- name: backendLocation
  displayName: Terraform State Location
  type: string
  default: centralindia
- name: backendStorageAccountName
  displayName: Terraform State Storage Account
  type: string
  default: tfstateazurevm001
- name: backendContainerName
  displayName: Terraform State Container
  type: string
  default: tfstate
- name: backendStateKey
  displayName: Terraform State File Name
  type: string
  default: azure-vm-terraform.tfstate

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: ${{ parameters.variableGroupName }}

steps:

# Install Terraform
- script: |
    sudo apt-get update
    sudo apt-get install -y wget unzip

    wget -q https://releases.hashicorp.com/terraform/1.8.5/terraform_1.8.5_linux_amd64.zip

    unzip -o terraform_1.8.5_linux_amd64.zip

    sudo chmod +x terraform
    sudo mv terraform /usr/local/bin/

    terraform version
  displayName: 'Install Terraform'

# Check Azure authentication variables before Terraform contacts Azure.
- script: |
    set -e

    for name in ARM_CLIENT_ID ARM_CLIENT_SECRET ARM_SUBSCRIPTION_ID ARM_TENANT_ID; do
      value="${!name}"

      if [ -z "$value" ] || [[ "$value" == \$\(* ]]; then
        echo "##vso[task.logissue type=error]Pipeline variable $name is missing or still set to a placeholder. Set it to the real Azure value in Pipeline variables or a linked variable group."
        exit 1
      fi
    done
  displayName: 'Validate Azure Credentials Variables'
  env:
    ARM_CLIENT_ID: $(ARM_CLIENT_ID)
    ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
    ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
    ARM_TENANT_ID: $(ARM_TENANT_ID)

# Create the Azure Storage backend used by Terraform state.
- script: |
    set -e

    az login \
      --service-principal \
      --username "$ARM_CLIENT_ID" \
      --password "$ARM_CLIENT_SECRET" \
      --tenant "$ARM_TENANT_ID" \
      --allow-no-subscriptions

    az account set --subscription "$ARM_SUBSCRIPTION_ID"

    az group create \
      --name "${{ parameters.backendResourceGroupName }}" \
      --location "${{ parameters.backendLocation }}"

    if ! az storage account show \
      --name "${{ parameters.backendStorageAccountName }}" \
      --resource-group "${{ parameters.backendResourceGroupName }}" >/dev/null 2>&1; then
      az storage account create \
        --name "${{ parameters.backendStorageAccountName }}" \
        --resource-group "${{ parameters.backendResourceGroupName }}" \
        --location "${{ parameters.backendLocation }}" \
        --sku Standard_LRS \
        --kind StorageV2 \
        --min-tls-version TLS1_2
    fi

    account_key=$(az storage account keys list \
      --account-name "${{ parameters.backendStorageAccountName }}" \
      --resource-group "${{ parameters.backendResourceGroupName }}" \
      --query "[0].value" \
      --output tsv)

    az storage container create \
      --name "${{ parameters.backendContainerName }}" \
      --account-name "${{ parameters.backendStorageAccountName }}" \
      --account-key "$account_key"
  displayName: 'Create Terraform State Storage'
  env:
    ARM_CLIENT_ID: $(ARM_CLIENT_ID)
    ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
    ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
    ARM_TENANT_ID: $(ARM_TENANT_ID)

# Terraform Init
- script: |
    terraform init \
      -backend-config="resource_group_name=${{ parameters.backendResourceGroupName }}" \
      -backend-config="storage_account_name=${{ parameters.backendStorageAccountName }}" \
      -backend-config="container_name=${{ parameters.backendContainerName }}" \
      -backend-config="key=${{ parameters.backendStateKey }}"
  workingDirectory: $(Build.SourcesDirectory)/infra
  displayName: 'Terraform Init'
  env:
    ARM_CLIENT_ID: $(ARM_CLIENT_ID)
    ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
    ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
    ARM_TENANT_ID: $(ARM_TENANT_ID)

# Terraform Validate
- script: |
    terraform validate
  workingDirectory: $(Build.SourcesDirectory)/infra
  displayName: 'Terraform Validate'

# Terraform Plan
- script: |
    terraform plan -out=tfplan
  workingDirectory: $(Build.SourcesDirectory)/infra
  displayName: 'Terraform Plan'
  condition: eq('${{ parameters.terraformAction }}','plan')
  env:
    ARM_CLIENT_ID: $(ARM_CLIENT_ID)
    ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
    ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
    ARM_TENANT_ID: $(ARM_TENANT_ID)

# Terraform Apply
- script: |
    terraform apply -auto-approve
  workingDirectory: $(Build.SourcesDirectory)/infra
  displayName: 'Terraform Apply'
  condition: eq('${{ parameters.terraformAction }}','apply')
  env:
    ARM_CLIENT_ID: $(ARM_CLIENT_ID)
    ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
    ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
    ARM_TENANT_ID: $(ARM_TENANT_ID)

# Terraform Destroy
- script: |
    terraform destroy -auto-approve
  workingDirectory: $(Build.SourcesDirectory)/infra
  displayName: 'Terraform Destroy'
  condition: eq('${{ parameters.terraformAction }}','destroy')
  env:
    ARM_CLIENT_ID: $(ARM_CLIENT_ID)
    ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
    ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
    ARM_TENANT_ID: $(ARM_TENANT_ID)
