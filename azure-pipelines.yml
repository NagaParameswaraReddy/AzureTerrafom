trigger: none

parameters:
- name: terraformAction
  displayName: Terraform Action
  type: string
  default: plan
  values:
    - plan
    - apply
    - destroy

pool:
  vmImage: 'ubuntu-latest'

steps:

# Azure Login
- task: AzureCLI@2
  displayName: 'Azure Login'
  inputs:
    azureSubscription: 'AzureTerraform'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      echo "Logged into Azure"

# Install Terraform
- script: |
    sudo apt-get update
    sudo apt-get install -y wget unzip

    wget -q https://releases.hashicorp.com/terraform/1.8.5/terraform_1.8.5_linux_amd64.zip

    unzip -o terraform_1.8.5_linux_amd64.zip

    ls -ltr

    sudo chmod +x terraform

    sudo mv terraform /usr/local/bin/

    terraform version
  displayName: 'Install Terraform'

# Terraform Init
- script: |
    cd infra
    terraform init
  displayName: 'Terraform Init'

# Terraform Validate
- script: |
    cd infra
    terraform validate
  displayName: 'Terraform Validate'

# Terraform Plan
- script: |
    cd infra

    terraform plan \
      -out=tfplan
  displayName: 'Terraform Plan'
  condition: eq('${{ parameters.terraformAction }}', 'plan')

# Terraform Apply
- script: |
    cd infra

    terraform apply \
      -auto-approve
  displayName: 'Terraform Apply'
  condition: eq('${{ parameters.terraformAction }}', 'apply')

# Terraform Destroy
- script: |
    cd infra

    terraform destroy \
      -auto-approve
  displayName: 'Terraform Destroy'
  condition: eq('${{ parameters.terraformAction }}', 'destroy')