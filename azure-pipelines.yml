trigger: none

parameters:
- name: terraformAction
  displayName: Terraform Action
  type: string
  default: plan
  values:
    - plan
    - apply
    - destroy
- name: variableGroupName
  displayName: Azure DevOps Variable Group Name
  type: string
  default: terraform-azure-creds

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: ${{ parameters.variableGroupName }}

steps:

# Install Terraform
- script: |
    sudo apt-get update
    sudo apt-get install -y wget unzip

    wget -q https://releases.hashicorp.com/terraform/1.8.5/terraform_1.8.5_linux_amd64.zip

    unzip -o terraform_1.8.5_linux_amd64.zip

    sudo chmod +x terraform
    sudo mv terraform /usr/local/bin/

    terraform version
  displayName: 'Install Terraform'

# Check Azure authentication variables before Terraform contacts Azure.
- script: |
    set -e

    for name in ARM_CLIENT_ID ARM_CLIENT_SECRET ARM_SUBSCRIPTION_ID ARM_TENANT_ID TFSTATE_RESOURCE_GROUP TFSTATE_LOCATION TFSTATE_STORAGE_ACCOUNT TFSTATE_CONTAINER TFSTATE_KEY; do
      value="${!name}"

      if [ -z "$value" ] || [[ "$value" == \$\(* ]]; then
        echo "##vso[task.logissue type=error]Pipeline variable $name is missing or still set to a placeholder. Set it to the real Azure value in Pipeline variables or a linked variable group."
        exit 1
      fi
    done
  displayName: 'Validate Azure Credentials Variables'
  env:
    ARM_CLIENT_ID: $(ARM_CLIENT_ID)
    ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
    ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
    ARM_TENANT_ID: $(ARM_TENANT_ID)
    TFSTATE_RESOURCE_GROUP: $(TFSTATE_RESOURCE_GROUP)
    TFSTATE_LOCATION: $(TFSTATE_LOCATION)
    TFSTATE_STORAGE_ACCOUNT: $(TFSTATE_STORAGE_ACCOUNT)
    TFSTATE_CONTAINER: $(TFSTATE_CONTAINER)
    TFSTATE_KEY: $(TFSTATE_KEY)

# Create the Azure Storage backend used by Terraform state.
- script: |
    set -e

    az login \
      --service-principal \
      --username "$ARM_CLIENT_ID" \
      --password "$ARM_CLIENT_SECRET" \
      --tenant "$ARM_TENANT_ID" \
      --allow-no-subscriptions

    az account set --subscription "$ARM_SUBSCRIPTION_ID"

    az group create \
      --name "$TFSTATE_RESOURCE_GROUP" \
      --location "$TFSTATE_LOCATION"

    if ! az storage account show \
      --name "$TFSTATE_STORAGE_ACCOUNT" \
      --resource-group "$TFSTATE_RESOURCE_GROUP" >/dev/null 2>&1; then
      az storage account create \
        --name "$TFSTATE_STORAGE_ACCOUNT" \
        --resource-group "$TFSTATE_RESOURCE_GROUP" \
        --location "$TFSTATE_LOCATION" \
        --sku Standard_LRS \
        --kind StorageV2 \
        --min-tls-version TLS1_2
    fi

    account_key=$(az storage account keys list \
      --account-name "$TFSTATE_STORAGE_ACCOUNT" \
      --resource-group "$TFSTATE_RESOURCE_GROUP" \
      --query "[0].value" \
      --output tsv)

    az storage container create \
      --name "$TFSTATE_CONTAINER" \
      --account-name "$TFSTATE_STORAGE_ACCOUNT" \
      --account-key "$account_key"
  displayName: 'Create Terraform State Storage'
  env:
    ARM_CLIENT_ID: $(ARM_CLIENT_ID)
    ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
    ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
    ARM_TENANT_ID: $(ARM_TENANT_ID)
    TFSTATE_RESOURCE_GROUP: $(TFSTATE_RESOURCE_GROUP)
    TFSTATE_LOCATION: $(TFSTATE_LOCATION)
    TFSTATE_STORAGE_ACCOUNT: $(TFSTATE_STORAGE_ACCOUNT)
    TFSTATE_CONTAINER: $(TFSTATE_CONTAINER)

# Terraform Init
- script: |
    terraform init \
      -backend-config="resource_group_name=$TFSTATE_RESOURCE_GROUP" \
      -backend-config="storage_account_name=$TFSTATE_STORAGE_ACCOUNT" \
      -backend-config="container_name=$TFSTATE_CONTAINER" \
      -backend-config="key=$TFSTATE_KEY"
  workingDirectory: $(Build.SourcesDirectory)/infra
  displayName: 'Terraform Init'
  env:
    ARM_CLIENT_ID: $(ARM_CLIENT_ID)
    ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
    ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
    ARM_TENANT_ID: $(ARM_TENANT_ID)
    TFSTATE_RESOURCE_GROUP: $(TFSTATE_RESOURCE_GROUP)
    TFSTATE_STORAGE_ACCOUNT: $(TFSTATE_STORAGE_ACCOUNT)
    TFSTATE_CONTAINER: $(TFSTATE_CONTAINER)
    TFSTATE_KEY: $(TFSTATE_KEY)

# Terraform Validate
- script: |
    terraform validate
  workingDirectory: $(Build.SourcesDirectory)/infra
  displayName: 'Terraform Validate'

# Terraform Plan
- script: |
    terraform plan -out=tfplan
  workingDirectory: $(Build.SourcesDirectory)/infra
  displayName: 'Terraform Plan'
  condition: eq('${{ parameters.terraformAction }}','plan')
  env:
    ARM_CLIENT_ID: $(ARM_CLIENT_ID)
    ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
    ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
    ARM_TENANT_ID: $(ARM_TENANT_ID)

# Terraform Apply
- script: |
    terraform apply -auto-approve
  workingDirectory: $(Build.SourcesDirectory)/infra
  displayName: 'Terraform Apply'
  condition: eq('${{ parameters.terraformAction }}','apply')
  env:
    ARM_CLIENT_ID: $(ARM_CLIENT_ID)
    ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
    ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
    ARM_TENANT_ID: $(ARM_TENANT_ID)

# Terraform Destroy
- script: |
    terraform destroy -auto-approve
  workingDirectory: $(Build.SourcesDirectory)/infra
  displayName: 'Terraform Destroy'
  condition: eq('${{ parameters.terraformAction }}','destroy')
  env:
    ARM_CLIENT_ID: $(ARM_CLIENT_ID)
    ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
    ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
    ARM_TENANT_ID: $(ARM_TENANT_ID)
